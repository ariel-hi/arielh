<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter Roguelike</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: "Press Start 2P", cursive;
            display: flex;
            overflow: hidden;
            box-sizing: border-box
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            position: relative;
            box-shadow: 0 0 20px #4a78ff80;
            overflow: visible
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain
        }

        #loading {
            color: #fff;
            z-index: 100;
            background-color: #0f0f1b;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            display: flex;
            position: absolute;
            top: 0;
            left: 0
        }

        #loading h1 {
            color: #4a78ff;
            text-shadow: 3px 3px #000;
            margin-bottom: 40px;
            font-size: 24px
        }

        #loading-bar {
            background: #000;
            border: 4px solid #fff;
            width: 200px;
            height: 30px;
            position: relative
        }

        #loading-progress {
            background-color: #4aff94;
            width: 0%;
            height: 100%;
            transition: width .3s
        }
    </style>
</head>

<body>
    <div id="game-container">
        <div id="loading">
            <h1>SPACE SHOOTER</h1>
            <div id="loading-bar">
                <div id="loading-progress"></div>
            </div>
        </div>
    </div> <audio id="bg-music" src="music.4794c797.mp3" loop autoplay volume="0.25"></audio> <audio id="sfx-hit"
        src="Hit%201.1ca32f45.mp3" preload volume="0.25"></audio> <audio id="sfx-destroy" src="destroy.2d74e718.wav"
        preload volume="0.25"></audio> <audio id="sfx-defeat" src="Game%20Over.53031db2.mp3" preload
        volume="0.25"></audio> <audio id="sfx-upgrade" src="upgrade.b0a32e88.mp3" preload style="display:none"
        volume="0.25"></audio>
    <script>document.addEventListener("DOMContentLoaded", () => { document.querySelectorAll("audio").forEach(e => { e.volume = .25 }); let e = document.getElementById("loading-progress"), t = document.getElementById("loading"), n = 0, d = setInterval(() => { n += 5, e.style.width = n + "%", n >= 100 && (clearInterval(d), setTimeout(() => { t.style.display = "none" }, 300)) }, 100) });</script>
    <script src="SpaceShooter.b25e51d9.js" type="module"></script>
</body>

</html>
